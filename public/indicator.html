<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMSN Dashboard – Indicator Detail</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<nav>
  <span class="brand">CMSN Democracy Schools</span>
  <a href="/">Overview</a>
  <a href="/framework.html">By Framework</a>
  <a href="/admin.html">Admin</a>
</nav>

<div class="container">
  <a href="/" class="back-link">← Back to Overview</a>

  <div class="detail-header" id="detail-header">
    <div class="ds-id" id="ds-id">—</div>
    <h2 id="ds-title">Loading…</h2>
    <p id="ds-desc" style="color:var(--muted);margin-top:.25rem;"></p>
    <div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap;" id="ds-meta"></div>
  </div>

  <!-- Framework Mappings -->
  <div class="card" style="margin-bottom:1rem;">
    <div class="section-title" style="margin-top:0;">Framework Alignments</div>
    <table class="mapping-table" id="mapping-table">
      <thead>
        <tr>
          <th>Framework</th>
          <th>Code</th>
          <th>Confidence</th>
          <th>Rationale</th>
        </tr>
      </thead>
      <tbody id="mapping-body">
        <tr><td colspan="4" style="text-align:center;color:var(--muted);">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Performance Records -->
  <div class="card" style="margin-bottom:1rem;">
    <div class="section-title" style="margin-top:0;">Performance Data</div>
    <div id="performance-area">
      <div class="empty-state">No performance data recorded yet.</div>
    </div>
  </div>

  <!-- Recommendations -->
  <div class="section-title">Recommended Resources</div>
  <div id="rec-area">
    <div class="empty-state">No recommendations linked to this indicator.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/indicator.js" type="module"></script>
</body>
</html>
